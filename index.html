<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <title>Geo-Lot System | Taman Saujana Putra</title>
        
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        
        <style>
            html, body, #map { width: 100%; height: 100%; padding: 0; margin: 0; background: #f0f0f0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
            
            /* UI Styling */
            #sidebar {
                position: absolute; top: 0; left: -350px; width: 320px; height: 100%;
                background: #1a252f; z-index: 2000; color: white; padding: 70px 20px 20px 20px;
                box-sizing: border-box; transition: 0.4s ease; box-shadow: 5px 0 15px rgba(0,0,0,0.3);
                overflow-y: auto;
            }
            #sidebar.active { left: 0; }
            #menu-btn {
                position: absolute; top: 15px; left: 15px; z-index: 2001;
                background: #3498db; color: white; border: none; padding: 12px 15px;
                border-radius: 8px; cursor: pointer; font-size: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            }
            .panel-section { margin-bottom: 20px; background: #2c3e50; padding: 15px; border-radius: 10px; }
            .panel-section h3 { font-size: 11px; text-transform: uppercase; margin: 0 0 10px 0; color: #3498db; border-bottom: 1px solid #3e4f5f; padding-bottom: 5px; }
            
            .search-box { display: flex; gap: 5px; }
            #lot-search-input { flex: 1; padding: 10px; border-radius: 5px; border: none; font-size: 14px; outline: none; }
            .btn-search { background: #3498db; color: white; border: none; padding: 0 15px; border-radius: 5px; cursor: pointer; }

            #info-panel { background: #ecf0f1; color: #2c3e50; padding: 15px; border-radius: 8px; }
            .info-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; border-bottom: 1px dotted #bdc3c7; }
            .info-label { font-weight: bold; }
            
            .action-btn { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; }
            .btn-gps { background: #3498db; color: white; }
            .btn-pdf-smart { background: #27ae60; color: white; }
            .btn-reset { background: #e67e22; color: white; font-size: 12px; }

            #header-box { position: absolute; top: 15px; left: 85px; z-index: 1000; background: rgba(255, 255, 255, 0.9); padding: 8px 20px; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 12px; backdrop-filter: blur(5px); }
            #header-box img { height: 28px; width: auto; }

            /* Kotak Maklumat PDF */
            #print-header {
                display: none;
                background: white; color: black; padding: 10px;
                border: 2px solid #333; margin-bottom: 10px; border-radius: 5px;
            }
            #print-header h2 { margin: 0; font-size: 18px; text-align: center; border-bottom: 2px solid #333; padding-bottom: 5px; text-transform: uppercase; }
            #print-header table { width: 100%; border-collapse: collapse; margin-top: 5px; }
            #print-header td { padding: 4px; font-size: 12px; border-bottom: 1px solid #eee; }

            /* =========================================
               MEDIA PRINT - FIX UNTUK 1 PAGE A4
               ========================================= */
            @media print {
                @page { 
                    size: A4 landscape; 
                    margin: 0.5cm; /* Memberi sedikit ruang tepi supaya tidak terpotong oleh printer */
                }
                
                /* Sembunyikan semua elemen UI */
                #sidebar, #header-box, #menu-btn, .leaflet-control-container, .leaflet-popup { 
                    display: none !important; 
                }

                body { 
                    background: white; 
                    overflow: hidden !important; /* Elakkan page kedua */
                    width: 100%;
                    height: 100%;
                }

                #print-header { 
                    display: block !important; 
                    width: 100%; 
                    box-sizing: border-box; 
                }
                
                #map { 
                    display: block !important;
                    position: relative !important; 
                    width: 100% !important; 
                    /* Tinggi dilaraskan supaya muat dalam 1 page selepas campur header */
                    height: 15.5cm !important; 
                    border: 2px solid #000 !important;
                    visibility: visible !important;
                    margin: 0 !important;
                }

                /* Jika cetakan penuh (tanpa jadual maklumat) */
                body.print-all #map {
                    height: 18.5cm !important;
                }
            }
        </style>
    </head>
    <body>

        <div id="print-header">
            <h2 id="print-title">PELAN LOKASI - TAMAN SAUJANA PUTRA</h2>
            <table id="print-table">
                <tr>
                    <td width="15%"><strong>Pemilik:</strong></td>
                    <td id="p-owner" width="35%">-</td>
                    <td width="15%"><strong>No. Lot:</strong></td>
                    <td id="p-lot" width="35%">-</td>
                </tr>
                <tr>
                    <td><strong>Keluasan:</strong></td>
                    <td id="p-area">-</td>
                    <td><strong>Tarikh:</strong></td>
                    <td><span id="p-date"></span></td>
                </tr>
            </table>
        </div>

        <button id="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>

        <div id="sidebar">
            <div class="panel-section">
                <h3><i class="fas fa-search"></i> Cari No. Lot</h3>
                <div class="search-box">
                    <input type="text" id="lot-search-input" placeholder="Masukkan No. Lot...">
                    <button class="btn-search" onclick="searchLot()"><i class="fas fa-search"></i></button>
                </div>
            </div>

            <div class="panel-section">
                <h3><i class="fas fa-info-circle"></i> Maklumat Lot</h3>
                <div id="info-panel">
                    <div class="info-item"><span class="info-label">No. Lot:</span> <span id="val-lot">-</span></div>
                    <div class="info-item"><span class="info-label">Pemilik:</span> <span id="val-owner">-</span></div>
                    <div class="info-item"><span class="info-label">Keluasan:</span> <span id="val-area">-</span></div>
                </div>
                <button class="action-btn btn-reset" onclick="resetSelection()"><i class="fas fa-undo"></i> RESET PILIHAN</button>
            </div>

            <div class="panel-section">
                <h3><i class="fas fa-tools"></i> Alatan</h3>
                <button class="action-btn btn-gps" onclick="findMe()"><i class="fas fa-location-arrow"></i> LOKASI SAYA</button>
                <button class="action-btn btn-pdf-smart" onclick="exportPDF()"><i class="fas fa-file-pdf"></i> EXPORT PDF</button>
            </div>
        </div>

        <div id="header-box">
            <img src="LOGO POLITEKNIK.png" alt="Logo">
            <div>
                <strong style="display:block; font-size:14px; line-height:1.2;">TAMAN SAUJANA PUTRA</strong>
                <span style="font-size:11px; color:#555;">84900 Tangkak, Johor</span>
            </div>
        </div>

        <div id="map"></div>

        <script src="js/leaflet.js"></script>
        <script src="data/lot_final_0.js"></script>

        <script>
            var map = L.map('map', { zoomControl: false, maxZoom: 22 }).setView([2.104, 102.521], 17);
            L.control.zoom({ position: 'bottomright' }).addTo(map);

            // Layer Google Satellite
            var googleSat = L.tileLayer('http://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',{
                maxZoom: 22, subdomains:['mt0','mt1','mt2','mt3'],
                attribution: 'Google Satellite'
            }).addTo(map);

            // Layer Google Street
            var googleStreets = L.tileLayer('http://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',{
                maxZoom: 22, subdomains:['mt0','mt1','mt2','mt3'],
                attribution: 'Google Street'
            });

            var baseMaps = {
                "Satelit": googleSat,
                "Street (Jalan)": googleStreets
            };
            L.control.layers(baseMaps, null, {position: 'topright'}).addTo(map);

            var selectedLayer = null;
            var defaultStyle = { color: '#333', weight: 1, fillColor: '#e5b636', fillOpacity: 0.5 };
            var highlightStyle = { color: '#ffffff', weight: 4, fillColor: '#f1c40f', fillOpacity: 0.8 };

            var layer_lot_final_0 = new L.geoJson(json_lot_final_0, {
                style: defaultStyle,
                onEachFeature: function(feature, layer) {
                    layer.on('click', function(e) {
                        highlightFeature(layer);
                        L.DomEvent.stopPropagation(e);
                    });
                }
            }).addTo(map);

            function highlightFeature(layer) {
                if (selectedLayer) { layer_lot_final_0.resetStyle(selectedLayer); }
                selectedLayer = layer;
                layer.setStyle(highlightStyle);
                
                var props = layer.feature.properties;
                document.getElementById('val-lot').innerText = props['NO_LOT'] || 'N/A';
                document.getElementById('val-owner').innerText = props['tsp — pe'] || 'N/A';
                document.getElementById('val-area').innerText = (props['AREA'] || '0') + ' m²';
                
                layer.bindPopup('<b>Lot: ' + props['NO_LOT'] + '</b>').openPopup();
            }

            function resetSelection() {
                if (selectedLayer) {
                    layer_lot_final_0.resetStyle(selectedLayer);
                    selectedLayer = null;
                }
                document.getElementById('val-lot').innerText = "-";
                document.getElementById('val-owner').innerText = "-";
                document.getElementById('val-area').innerText = "-";
                map.closePopup();
            }

            function searchLot() {
                var searchVal = document.getElementById('lot-search-input').value.trim();
                var found = false;
                layer_lot_final_0.eachLayer(function(layer) {
                    if (layer.feature.properties.NO_LOT == searchVal) {
                        found = true;
                        highlightFeature(layer);
                        map.fitBounds(layer.getBounds(), {padding: [100, 100]});
                    }
                });
                if (!found) alert("No. Lot tidak dijumpai.");
            }

            function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

            function exportPDF() {
                var dateStr = new Date().toLocaleDateString('ms-MY');
                document.getElementById('p-date').innerText = dateStr;
                var lotVal = document.getElementById('val-lot').innerText;

                // Tutup sidebar sebelum print
                document.getElementById('sidebar').classList.remove('active');

                if (lotVal !== "-") {
                    document.body.classList.remove('print-all');
                    document.getElementById('print-title').innerText = "PELAN LOKASI LOT - TAMAN SAUJANA PUTRA";
                    document.getElementById('print-table').style.display = "table";
                    document.getElementById('p-owner').innerText = document.getElementById('val-owner').innerText;
                    document.getElementById('p-lot').innerText = lotVal;
                    document.getElementById('p-area').innerText = document.getElementById('val-area').innerText;
                } else {
                    document.body.classList.add('print-all');
                    document.getElementById('print-title').innerText = "PELAN KESELURUHAN - TAMAN SAUJANA PUTRA";
                    document.getElementById('print-table').style.display = "none";
                }

                // Memberi masa untuk render dan panggil dialog print
                setTimeout(function(){ 
                    map.invalidateSize();
                    window.print(); 
                }, 800);
            }

            function findMe() {
                map.locate({setView: true, maxZoom: 18});
                if (document.getElementById('sidebar').classList.contains('active')) toggleSidebar();
            }
        </script>
    </body>
</html>
